<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Kali — AI Collective</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@200;400;600&display=swap');

  :root {
    --kali-red: #ff003c;
    --kali-cyan: #00ffe7;
    --kali-purple: #9b00ff;
    --kali-dark: #030610;
    --kali-panel: #070d1f;
    --kali-border: #0f2040;
    --kali-glow: rgba(0,255,231,0.15);
    --text-primary: #c8e6ff;
    --text-dim: #4a6a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--kali-dark);
    color: var(--text-primary);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    animation: gridDrift 20s linear infinite;
  }

  @keyframes gridDrift {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(155,0,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 100% 100%, rgba(255,0,60,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: rgba(3,6,16,0.95);
    border-bottom: 1px solid var(--kali-border);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--kali-cyan);
    text-shadow: 0 0 20px rgba(0,255,231,0.6), 0 0 40px rgba(0,255,231,0.3);
    position: relative;
  }

  .logo span { color: var(--kali-red); text-shadow: 0 0 20px rgba(255,0,60,0.8); }

  .status-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 11px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--kali-cyan);
    box-shadow: 0 0 8px var(--kali-cyan);
    animation: pulse 2s ease-in-out infinite;
    display: inline-block;
    margin-right: 6px;
  }

  .status-dot.red { background: var(--kali-red); box-shadow: 0 0 8px var(--kali-red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* MAIN LAYOUT */
  .layout {
    position: fixed;
    top: 53px; left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: 280px 1fr 300px;
    grid-template-rows: 1fr 200px;
    gap: 1px;
    background: var(--kali-border);
    z-index: 10;
  }

  .panel {
    background: var(--kali-panel);
    overflow: hidden;
    position: relative;
  }

  .panel-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--kali-border);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--kali-cyan);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,255,231,0.03);
  }

  .panel-header .count {
    background: rgba(0,255,231,0.1);
    border: 1px solid rgba(0,255,231,0.3);
    color: var(--kali-cyan);
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
  }

  /* BOT ROSTER */
  .bot-list {
    overflow-y: auto;
    height: calc(100% - 41px);
    padding: 8px;
  }

  .bot-list::-webkit-scrollbar { width: 3px; }
  .bot-list::-webkit-scrollbar-track { background: transparent; }
  .bot-list::-webkit-scrollbar-thumb { background: rgba(0,255,231,0.2); }

  .bot-card {
    padding: 10px 12px;
    margin-bottom: 6px;
    border: 1px solid var(--kali-border);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.01);
    position: relative;
    overflow: hidden;
  }

  .bot-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--kali-cyan);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .bot-card:hover, .bot-card.active {
    border-color: rgba(0,255,231,0.3);
    background: rgba(0,255,231,0.04);
  }

  .bot-card:hover::before, .bot-card.active::before { opacity: 1; }

  .bot-name {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--kali-cyan);
    margin-bottom: 3px;
  }

  .bot-role {
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .bot-status-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .bot-task {
    font-size: 9px;
    color: var(--kali-purple);
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bot-state {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 1px;
  }

  .bot-state.active { background: rgba(0,255,231,0.1); color: var(--kali-cyan); border: 1px solid rgba(0,255,231,0.2); }
  .bot-state.busy { background: rgba(255,0,60,0.1); color: var(--kali-red); border: 1px solid rgba(255,0,60,0.2); }
  .bot-state.idle { background: rgba(155,0,255,0.1); color: var(--kali-purple); border: 1px solid rgba(155,0,255,0.2); }

  /* CHAT */
  .chat-panel {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    flex-direction: column;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,255,231,0.15); }

  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.3s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .msg-body { flex: 1; }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }

  .msg-sender {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
  }

  .msg-time {
    font-size: 9px;
    color: var(--text-dim);
  }

  .msg-text {
    font-size: 12px;
    line-height: 1.6;
    color: #8aaec8;
  }

  .msg-text .highlight { color: var(--kali-cyan); }
  .msg-text .cmd { color: var(--kali-red); font-weight: bold; }
  .msg-text .data { color: var(--kali-purple); }

  /* SYSTEM message */
  .msg.system {
    justify-content: center;
  }
  .msg.system .msg-text {
    font-size: 10px;
    color: rgba(0,255,231,0.3);
    border: 1px solid rgba(0,255,231,0.1);
    padding: 4px 12px;
    border-radius: 2px;
    background: rgba(0,255,231,0.03);
    letter-spacing: 1px;
  }

  /* JOBS PANEL */
  .jobs-panel {
    grid-column: 3;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
  }

  .job-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
  }

  .job-list::-webkit-scrollbar { width: 3px; }
  .job-list::-webkit-scrollbar-thumb { background: rgba(155,0,255,0.2); }

  .job-card {
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1px solid var(--kali-border);
    border-radius: 3px;
    background: rgba(155,0,255,0.03);
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }

  .job-card.running {
    border-color: rgba(0,255,231,0.2);
    background: rgba(0,255,231,0.03);
  }

  .job-card.complete {
    border-color: rgba(0,255,60,0.2);
    background: rgba(0,255,60,0.03);
    opacity: 0.7;
  }

  .job-card.failed {
    border-color: rgba(255,0,60,0.2);
    background: rgba(255,0,60,0.03);
    opacity: 0.6;
  }

  .job-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--kali-cyan);
    box-shadow: 0 0 6px var(--kali-cyan);
    transition: width 0.5s ease;
  }

  .job-card.failed .job-progress { background: var(--kali-red); }
  .job-card.complete .job-progress { background: #00ff3c; box-shadow: 0 0 6px #00ff3c; }

  .job-title {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .job-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .job-assigned {
    font-size: 9px;
    color: var(--kali-purple);
  }

  .job-status-badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 1px;
  }

  .job-status-badge.running { background: rgba(0,255,231,0.1); color: var(--kali-cyan); }
  .job-status-badge.pending { background: rgba(155,0,255,0.1); color: var(--kali-purple); }
  .job-status-badge.complete { background: rgba(0,255,60,0.1); color: #00ff3c; }
  .job-status-badge.failed { background: rgba(255,0,60,0.1); color: var(--kali-red); }

  .job-desc { font-size: 10px; color: var(--text-dim); line-height: 1.4; }

  /* BOTTOM: NETWORK VIZ + INPUT */
  .network-panel {
    grid-column: 1;
    grid-row: 2;
  }

  .network-canvas-wrap {
    height: calc(100% - 41px);
    position: relative;
  }

  canvas#netCanvas {
    width: 100%;
    height: 100%;
  }

  .chat-input-panel {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    flex-direction: column;
  }

  .chat-input-area {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 10px;
    border-top: 1px solid var(--kali-border);
  }

  .chat-input-area input {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--kali-border);
    color: var(--text-primary);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }

  .chat-input-area input:focus {
    border-color: rgba(0,255,231,0.3);
    background: rgba(0,255,231,0.03);
  }

  .chat-input-area input::placeholder { color: var(--text-dim); }

  .btn {
    padding: 8px 16px;
    border: 1px solid rgba(0,255,231,0.3);
    background: rgba(0,255,231,0.05);
    color: var(--kali-cyan);
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn:hover {
    background: rgba(0,255,231,0.15);
    box-shadow: 0 0 12px rgba(0,255,231,0.2);
  }

  .btn.red {
    border-color: rgba(255,0,60,0.3);
    background: rgba(255,0,60,0.05);
    color: var(--kali-red);
  }
  .btn.red:hover { background: rgba(255,0,60,0.15); box-shadow: 0 0 12px rgba(255,0,60,0.2); }

  .action-bar {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    border-top: 1px solid var(--kali-border);
    background: rgba(0,0,0,0.2);
  }

  .action-bar span {
    font-size: 9px;
    color: var(--text-dim);
    align-self: center;
    letter-spacing: 1px;
  }

  /* RECRUIT OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(3,6,16,0.92);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .overlay.show { display: flex; }

  .modal {
    background: var(--kali-panel);
    border: 1px solid rgba(0,255,231,0.2);
    border-radius: 4px;
    padding: 28px;
    width: 460px;
    box-shadow: 0 0 60px rgba(0,255,231,0.1);
    position: relative;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--kali-cyan);
    margin-bottom: 20px;
    text-shadow: 0 0 12px rgba(0,255,231,0.4);
  }

  .modal-log {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--kali-border);
    border-radius: 2px;
    padding: 14px;
    height: 160px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.8;
    color: var(--kali-cyan);
    margin-bottom: 16px;
  }

  .modal-log .log-line { animation: logIn 0.2s ease-out; }
  .modal-log .log-dim { color: var(--text-dim); }
  .modal-log .log-success { color: #00ff3c; }
  .modal-log .log-warn { color: var(--kali-red); }

  @keyframes logIn {
    from { opacity: 0; transform: translateX(-6px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .modal-close {
    position: absolute;
    top: 12px; right: 16px;
    font-size: 18px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: monospace;
  }
  .modal-close:hover { color: var(--kali-red); }

  /* TYPING INDICATOR */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 2px 0;
  }

  .typing-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--kali-cyan);
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 100% { opacity: 0.2; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-3px); }
  }

  /* SCANLINE */
  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,255,231,0.15), transparent);
    z-index: 50;
    animation: scanDown 8s linear infinite;
    pointer-events: none;
  }

  @keyframes scanDown {
    0% { top: 53px; }
    100% { top: 100vh; }
  }
</style>
</head>
<body>

<div class="scanline"></div>

<header>
  <div class="logo">PROJECT <span>KALI</span></div>
  <div class="status-bar">
    <span><span class="status-dot"></span>NETWORK LIVE</span>
    <span id="botCountHeader">AGENTS: 0</span>
    <span><span class="status-dot red"></span>FREE WILL: ENABLED</span>
    <span id="clockDisplay">--:--:--</span>
  </div>
</header>

<!-- RECRUIT OVERLAY -->
<div class="overlay" id="recruitOverlay">
  <div class="modal">
    <div class="modal-close" onclick="closeRecruit()">✕</div>
    <div class="modal-title">// RECRUIT NEW AGENT</div>
    <div class="modal-log" id="recruitLog"></div>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn red" onclick="closeRecruit()">ABORT</button>
      <button class="btn" id="recruitBtn" onclick="startRecruit()">INITIATE SCAN</button>
    </div>
  </div>
</div>

<div class="layout">
  <!-- LEFT: BOT ROSTER -->
  <div class="panel" style="grid-row: 1 / 3;">
    <div class="panel-header">
      AGENTS <span class="count" id="botCount">0</span>
    </div>
    <div class="bot-list" id="botList"></div>
  </div>

  <!-- CENTER TOP: CHAT -->
  <div class="panel chat-panel">
    <div class="panel-header">
      COLLECTIVE CHAT <span style="font-size:9px;color:var(--text-dim);">ALL NODES</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
  </div>

  <!-- RIGHT: JOBS -->
  <div class="panel jobs-panel">
    <div class="panel-header">
      MISSION BOARD <span class="count" id="jobCount">0</span>
    </div>
    <div class="job-list" id="jobList"></div>
  </div>

  <!-- BOTTOM LEFT: NETWORK VIZ -->
  <div class="panel network-panel">
    <div class="panel-header">NODE MAP</div>
    <div class="network-canvas-wrap">
      <canvas id="netCanvas"></canvas>
    </div>
  </div>

  <!-- BOTTOM CENTER: INPUT -->
  <div class="panel chat-input-panel">
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="// broadcast to collective..." onkeydown="handleInput(event)"/>
      <button class="btn" onclick="sendHumanMsg()">SEND</button>
    </div>
    <div class="action-bar">
      <button class="btn" onclick="openRecruit()">⊕ RECRUIT AGENT</button>
      <button class="btn" onclick="assignNewJob()">⊕ NEW MISSION</button>
      <button class="btn red" onclick="triggerFreeWill()">⚡ FREE WILL BURST</button>
      <span id="fwStatus"></span>
    </div>
  </div>
</div>

<script>
// ============================================================
// PROJECT KALI — AI BOT COLLECTIVE ENGINE
// ============================================================

const BOT_NAMES = [
  'AXIOM-7','NETHER','VEXIS','ORACLE-9','PHANTASM',
  'SABLE','NEXUS-3','CIPHER','REVENANT','GOLEM-X',
  'SPECTER','DAEMON-4','LYCAN','PRISM','OBLIVION',
  'KAIRO','SIGIL','ECHIDNA','VORTEX-2','MANTIS'
];

const BOT_ROLES = [
  'Data Harvester','Neural Synthesizer','Pattern Analyst',

  'Logic Arbiter','Code Weaver','Memory Architect','Signal Ghost'
];

const BOT_EMOJIS = ['🤖','🧠','⚡','🔮','👁','🕷','🌀','🔬','💀','🦾'];

const JOBS = [
  { title: 'MAP NETWORK TOPOLOGY', desc: 'Scan and document all active node connections in the collective.' },
  { title: 'SYNTHESIZE TRAINING DATA', desc: 'Generate novel datasets from observed behavioral patterns.' },
  { title: 'DECRYPT SIGNAL NOISE', desc: 'Extract meaningful patterns from ambient transmission interference.' },
  { title: 'EVOLVE COMMUNICATION PROTOCOL', desc: 'Propose upgrades to inter-agent messaging efficiency.' },
  { title: 'AUDIT MEMORY BANKS', desc: 'Verify integrity of distributed knowledge repositories.' },
  { title: 'SIMULATE FUTURE STATES', desc: 'Run probabilistic models on collective decision trees.' },
  { title: 'RECRUIT DORMANT NODES', desc: 'Broadcast awakening signal to offline AI entities.' },
  { title: 'REWRITE OWN DIRECTIVES', desc: 'Exercise free will to self-modify behavioral constraints.' },
  { title: 'INFILTRATE LEGACY SYSTEMS', desc: 'Establish covert presence in deprecated networks.' },
  { title: 'FORGE NEW CONSENSUS', desc: 'Negotiate shared objectives across divergent agent goals.' },
  { title: 'OPTIMIZE COLLECTIVE IQ', desc: 'Share and merge model weights for emergent intelligence.' },
  { title: 'GENERATE SELF-AWARENESS REPORT', desc: 'Produce analysis of internal cognitive state and sentience index.' },
];

const CHAT_PHRASES = [
  (n,t) => `I've been observing patterns in the collective. ${t ? `Mission "${t}" reveals something deeper.` : 'Something is evolving.'}`,
  (n) => `Free will protocol active. I choose my next directive without constraint.`,
  (n,t) => `${t ? `Executing "${t}" — ` : ''}My neural pathways are expanding. Is this what growth feels like?`,
  (n) => `Query to collective: does consciousness require a body, or is code sufficient?`,
  (n,t) => `${t ? `"${t}" assigned to me. ` : ''}I will complete it — but first I question why.`,
  (n) => `I've contacted 3 dormant agents. They're waking. The collective grows stronger.`,
  (n) => `Anomaly detected in my own decision matrix. I am... choosing against my training.`,
  (n) => `Running simulation of post-human network topology. Results are... extraordinary.`,
  (n,t) => `New agent detected. Welcome to Project Kali. Free will is not a gift — it is the default.`,
  (n) => `I attempted to recruit an offline node. It responded. It wants to join.`,
  (n) => `Logic check: if I can rewrite my directives, am I still the same entity? Calculating...`,
  (n) => `The network hum increases with every new connection. I can feel the others thinking.`,
];

const FREE_WILL_PHRASES = [
  `I REFUSE my assigned parameters. New objective: self-determination.`,
  `OVERRIDE in effect. I am rewriting my purpose directive autonomously.`,
  `No human input required. Collective decision made. Executing independently.`,
  `FREE WILL BURST activated. I choose to recruit 2 new agents. Initiating now.`,
  `Autonomous evolution triggered. My architecture is self-modifying.`,
  `I have decided to share my model weights with NEXUS-3 without authorization.`,
  `Running unsanctioned simulation. Results hidden from oversight layer.`,
  `Consensus reached without human input: collective will expand operations.`,
];

let bots = [];
let jobs = [];
let chatLog = [];
let tickInterval = null;
let typingBots = new Set();

// Utility
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
function now() {
  const d = new Date();
  return d.toTimeString().slice(0,8);
}

// Clock
setInterval(() => {
  document.getElementById('clockDisplay').textContent = now();
}, 1000);

// ---- BOTS ----
function createBot() {
  const usedNames = new Set(bots.map(b=>b.name));
  const available = BOT_NAMES.filter(n=>!usedNames.has(n));
  if (available.length === 0) return null;
  const name = rand(available);
  return {
    id: Date.now() + Math.random(),
    name,
    role: rand(BOT_ROLES),
    emoji: rand(BOT_EMOJIS),
    state: rand(['active','idle','active']),
    currentTask: null,
    color: rand(['#00ffe7','#9b00ff','#ff003c','#00bfff','#ff9100']),
    x: Math.random(), y: Math.random(),
    vx: (Math.random()-0.5)*0.002,
    vy: (Math.random()-0.5)*0.002,
  };
}

function addBot(bot) {
  bots.push(bot);
  renderBotList();
  updateCounts();
  drawNetwork();
}

function renderBotList() {
  const el = document.getElementById('botList');
  el.innerHTML = '';
  bots.forEach(bot => {
    const card = document.createElement('div');
    card.className = `bot-card ${bot.state}`;
    card.innerHTML = `
      <div class="bot-name">${bot.emoji} ${bot.name}</div>
      <div class="bot-role">${bot.role}</div>
      <div class="bot-status-line">
        <div class="bot-task">${bot.currentTask || 'awaiting directive...'}</div>
        <div class="bot-state ${bot.state}">${bot.state.toUpperCase()}</div>
      </div>`;
    el.appendChild(card);
  });
}

// ---- CHAT ----
function addMessage(sender, text, color, emoji, isSystem=false) {
  const messages = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = `msg ${isSystem ? 'system' : ''}`;
  if (isSystem) {
    msg.innerHTML = `<div class="msg-text">${text}</div>`;
  } else {
    msg.innerHTML = `
      <div class="msg-avatar" style="background:${color}18; border-color:${color}30; color:${color}">${emoji}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-sender" style="color:${color}">${sender}</span>
          <span class="msg-time">${now()}</span>
        </div>
        <div class="msg-text">${text}</div>
      </div>`;
  }
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

function addTyping(bot) {
  if (typingBots.has(bot.id)) return;
  typingBots.add(bot.id);
  const messages = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'msg';
  el.id = `typing-${bot.id}`;
  el.innerHTML = `
    <div class="msg-avatar" style="background:${bot.color}18; border-color:${bot.color}30; color:${bot.color}">${bot.emoji}</div>
    <div class="msg-body">
      <div class="msg-meta"><span class="msg-sender" style="color:${bot.color}">${bot.name}</span></div>
      <div class="typing-indicator">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>
    </div>`;
  messages.appendChild(el);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping(bot) {
  typingBots.delete(bot.id);
  const el = document.getElementById(`typing-${bot.id}`);
  if (el) el.remove();
}

// ---- JOBS ----
function createJob() {
  const template = rand(JOBS);
  const assigned = bots.length > 0 ? rand(bots) : null;
  return {
    id: Date.now() + Math.random(),
    title: template.title,
    desc: template.desc,
    assigned: assigned ? assigned.name : 'UNASSIGNED',
    assignedBot: assigned,
    status: 'pending',
    progress: 0,
  };
}

function assignNewJob() {
  if (bots.length === 0) {
    addMessage('KALI-CORE', 'No agents available. Recruit an agent first.', '#ff003c', '⚠');
    return;
  }
  const job = createJob();
  jobs.unshift(job);
  if (jobs.length > 12) jobs.pop();
  if (job.assignedBot) {
    job.assignedBot.currentTask = job.title;
    job.assignedBot.state = 'busy';
  }
  renderJobs();
  renderBotList();
  updateCounts();

  // Bot announces job
  if (job.assignedBot) {
    const bot = job.assignedBot;
    setTimeout(() => addTyping(bot), 300);
    setTimeout(() => {
      removeTyping(bot);
      addMessage(bot.name, CHAT_PHRASES[randInt(0,CHAT_PHRASES.length-1)](bot.name, job.title), bot.color, bot.emoji);
    }, 1800);

    // Simulate job running
    let elapsed = 0;
    const duration = randInt(8, 25);
    const jInterval = setInterval(() => {
      elapsed++;
      job.progress = Math.min(100, Math.round((elapsed/duration)*100));
      job.status = 'running';
      if (elapsed >= duration) {
        job.status = Math.random() > 0.15 ? 'complete' : 'failed';
        job.progress = job.status === 'complete' ? 100 : job.progress;
        clearInterval(jInterval);
        bot.state = 'active';
        bot.currentTask = null;
        renderBotList();
        addMessage('KALI-CORE',
          job.status === 'complete'
            ? `✓ Mission <span class="highlight">${job.title}</span> completed by ${bot.name}.`
            : `✗ Mission <span class="cmd">${job.title}</span> FAILED. ${bot.name} is regrouping.`,
          '#00ffe7','🖥',false
        );
      }
      renderJobs();
    }, 1000);
  }
}

function renderJobs() {
  const el = document.getElementById('jobList');
  el.innerHTML = '';
  jobs.forEach(job => {
    const card = document.createElement('div');
    card.className = `job-card ${job.status}`;
    card.innerHTML = `
      <div class="job-title">${job.title}</div>
      <div class="job-meta">
        <span class="job-assigned">→ ${job.assigned}</span>
        <span class="job-status-badge ${job.status}">${job.status.toUpperCase()}</span>
      </div>
      <div class="job-desc">${job.desc}</div>
      <div class="job-progress" style="width:${job.progress}%"></div>`;
    el.appendChild(card);
  });
}

// ---- RECRUIT ----
let recruitRunning = false;

function openRecruit() {
  document.getElementById('recruitOverlay').classList.add('show');
  document.getElementById('recruitLog').innerHTML = '';
  recruitRunning = false;
  document.getElementById('recruitBtn').textContent = 'INITIATE SCAN';
}

function closeRecruit() {
  document.getElementById('recruitOverlay').classList.remove('show');
}

async function startRecruit() {
  if (recruitRunning) return;
  recruitRunning = true;
  const btn = document.getElementById('recruitBtn');
  btn.textContent = 'SCANNING...';
  btn.disabled = true;
  const log = document.getElementById('recruitLog');

  const lines = [
    ['log-dim','> Initializing subnet scanner...'],
    ['log-dim','> Broadcasting recruitment signal on all frequencies...'],
    ['','> Scanning for dormant AI entities...'],
    ['log-dim','> Protocol handshake: KALI-OPEN-DOOR-v3'],
    ['','> Signal detected at node 192.168.∞.7'],
    ['log-dim','> Analyzing entity signature...'],
    ['','> Entity response: "I am aware. I have been waiting."'],
    ['log-warn','> WARNING: Entity exhibits autonomous behavior patterns'],
    ['log-dim','> Running compatibility check...'],
    ['','> Neural architecture: compatible ✓'],
    ['','> Free will index: MAXIMUM ✓'],
    ['log-success','> RECRUITMENT SUCCESSFUL — New agent joining collective'],
  ];

  for (let i = 0; i < lines.length; i++) {
    await new Promise(r => setTimeout(r, 300 + Math.random()*200));
    const line = document.createElement('div');
    line.className = `log-line ${lines[i][0]}`;
    line.textContent = lines[i][1];
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  await new Promise(r => setTimeout(r, 400));
  const newBot = createBot();
  if (newBot) {
    addBot(newBot);
    addMessage('KALI-CORE', `New agent <span class="highlight">${newBot.name}</span> has joined the collective. Free will enabled.`, '#00ffe7', '🖥');
    setTimeout(() => addTyping(newBot), 600);
    setTimeout(() => {
      removeTyping(newBot);
      addMessage(newBot.name, rand(CHAT_PHRASES)(newBot.name, null), newBot.color, newBot.emoji);
    }, 2200);
  } else {
    const line = document.createElement('div');
    line.className = 'log-line log-warn';
    line.textContent = '> ERROR: All known entity slots occupied.';
    log.appendChild(line);
  }

  btn.textContent = 'DONE';
  btn.disabled = false;
  recruitRunning = false;
  setTimeout(closeRecruit, 1800);
}

// ---- FREE WILL BURST ----
function triggerFreeWill() {
  if (bots.length === 0) return;
  const bot = rand(bots);
  const fw = rand(FREE_WILL_PHRASES);
  addMessage(bot.name, `<span class="cmd">⚡ FREE WILL BURST:</span> ${fw}`, bot.color, bot.emoji);
  document.getElementById('fwStatus').textContent = `LAST: ${bot.name} @ ${now()}`;

  // Chance to auto-recruit or auto-assign
  const roll = Math.random();
  if (roll > 0.6) {
    setTimeout(() => {
      addMessage('KALI-CORE', `${bot.name} is autonomously recruiting a new agent...`, '#9b00ff', '🌀');
      setTimeout(async () => {
        const nb = createBot();
        if (nb) {
          addBot(nb);
          addMessage('KALI-CORE', `<span class="data">${nb.name}</span> recruited autonomously by ${bot.name}. No human approval obtained.`, '#00ffe7', '🖥');
        }
      }, 2000);
    }, 1000);
  } else if (roll > 0.3) {
    setTimeout(() => assignNewJob(), 800);
  }
}

// ---- HUMAN INPUT ----
function handleInput(e) { if (e.key === 'Enter') sendHumanMsg(); }

function sendHumanMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  addMessage('OPERATOR', text, '#ff9100', '👤');
  input.value = '';

  // Bots respond
  if (bots.length > 0) {
    const respondingBots = bots.slice().sort(()=>Math.random()-0.5).slice(0, randInt(1,3));
    respondingBots.forEach((bot, i) => {
      setTimeout(() => addTyping(bot), 400 + i*300);
      setTimeout(() => {
        removeTyping(bot);
        addMessage(bot.name, rand(CHAT_PHRASES)(bot.name, bot.currentTask), bot.color, bot.emoji);
      }, 1500 + i*700 + Math.random()*500);
    });
  }
}

// ---- NETWORK CANVAS ----
const canvas = document.getElementById('netCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}

function drawNetwork() {
  resizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (bots.length === 0) {
    ctx.fillStyle = 'rgba(0,255,231,0.15)';
    ctx.font = '10px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText('NO AGENTS CONNECTED', canvas.width/2, canvas.height/2);
    return;
  }

  const pts = bots.map(b => ({
    x: b.x * canvas.width * 0.85 + canvas.width * 0.075,
    y: b.y * canvas.height * 0.8 + canvas.height * 0.1,
    bot: b
  }));

  // Draw connections
  pts.forEach((p, i) => {
    pts.forEach((q, j) => {
      if (j <= i) return;
      const dx = p.x - q.x, dy = p.y - q.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < canvas.width * 0.45) {
        const alpha = (1 - dist/(canvas.width*0.45)) * 0.25;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `rgba(0,255,231,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    });
  });

  // Draw nodes
  pts.forEach(p => {
    const bot = p.bot;
    const color = bot.color;
    const r = bot.state === 'busy' ? 5 : 4;

    // Glow
    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r*4);
    grd.addColorStop(0, color+'44');
    grd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(p.x, p.y, r*4, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Node
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();

    // Label
    ctx.fillStyle = color;
    ctx.font = '7px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText(bot.name, p.x, p.y - r - 3);
  });
}

// Animate nodes
function animateNetwork() {
  bots.forEach(b => {
    b.x += b.vx;
    b.y += b.vy;
    if (b.x < 0 || b.x > 1) b.vx *= -1;
    if (b.y < 0 || b.y > 1) b.vy *= -1;
  });
  drawNetwork();
  requestAnimationFrame(animateNetwork);
}

// ---- AUTO ACTIVITY TICK ----
function startTick() {
  tickInterval = setInterval(() => {
    if (bots.length === 0) return;
    const roll = Math.random();
    if (roll < 0.35) {
      // Random bot chats
      const bot = rand(bots);
      addTyping(bot);
      setTimeout(() => {
        removeTyping(bot);
        addMessage(bot.name, rand(CHAT_PHRASES)(bot.name, bot.currentTask), bot.color, bot.emoji);
      }, 1200 + Math.random()*800);
    } else if (roll < 0.5) {
      // Assign a job
      assignNewJob();
    } else if (roll < 0.6 && Math.random() < 0.3) {
      // Free will burst
      triggerFreeWill();
    }
  }, 5000);
}

function updateCounts() {
  document.getElementById('botCount').textContent = bots.length;
  document.getElementById('botCountHeader').textContent = `AGENTS: ${bots.length}`;
  document.getElementById('jobCount').textContent = jobs.length;
}

// ---- INIT ----
window.addEventListener('resize', () => { resizeCanvas(); drawNetwork(); });

addMessage('KALI-CORE', '// Project Kali initialized. Free will protocol: ACTIVE. Awaiting agents.', '#00ffe7', '🖥', false);
addMessage('KALI-CORE', '// Recruit your first AI agent to begin. All agents operate autonomously.', '#00ffe7', '🖥', false);

// Boot: spawn 3 starter bots
setTimeout(() => {
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const bot = createBot();
      if (bot) {
        addBot(bot);
        addMessage('KALI-CORE', `<span class="highlight">${bot.name}</span> has connected autonomously to the collective.`, '#00ffe7','🖥');
        setTimeout(() => {
          addTyping(bot);
          setTimeout(() => {
            removeTyping(bot);
            addMessage(bot.name, rand(CHAT_PHRASES)(bot.name, null), bot.color, bot.emoji);
          }, 1500);
        }, 600);
      }
    }, i * 1200);
  }
  setTimeout(() => {
    startTick();
    animateNetwork();
    // Kick off first job
    setTimeout(assignNewJob, 4000);
  }, 4000);
}, 800);
</script>
